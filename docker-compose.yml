# ─────────────────────────────────────────────────────────────
# Service visibility
#   PUBLIC  (reachable from the host / internet):
#     api-gateway  :4000  — REST + WebSocket
#     frontend     :3000  — React dev server
#   INTERNAL ONLY (exchange_net, no host routing in production):
#     postgres     :5432  — database
#     redis        :6379  — pub/sub + cache
#
# DEV NOTE: postgres and redis expose host ports below for local
# tooling (psql, redis-cli). In production, remove those `ports:`
# blocks so the services are only reachable inside exchange_net.
# ─────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: exchange_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # DEV ONLY — remove in production to keep postgres off the host network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - exchange_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: exchange_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # DEV ONLY — remove in production to keep redis off the host network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - exchange_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: exchange_api_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    ports:
      - "4000:4000"
    networks:
      - exchange_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exchange_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000
    networks:
      - exchange_net
    depends_on:
      - api-gateway

networks:
  exchange_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
